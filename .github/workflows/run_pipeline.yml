name: Run Spelling Alignment Pipeline

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder (Do not change for Project 2)'
        required: true
        default: 'project_2'
      config:
        description: 'Pipeline config filename'
        required: true
        default: 'pipeline_config.json'
      model:
        description: 'Selected Gemini Model'
        required: true
        default: 'gemini-3.1-flash-lite'
      phase:
        description: 'Current execution phase'
        required: true
        default: '1'
      total-phases:
        description: 'Total phases'
        required: true
        default: '1'
      concurrency:
        description: 'Concurrent request limit'
        required: true
        default: '2'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Allows pushing the updated state and encrypted zips back to the repository

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "google-genai<2.0" "pydantic<=2.12.3" pyyaml pytz tqdm pydub "httpx[socks]"

    - name: Run Pipeline with Encryption
      env:
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
      run: |
        python run_pipeline.py \
          --project "${{ github.event.inputs.project }}" \
          --config "${{ github.event.inputs.config }}" \
          --model "${{ github.event.inputs.model }}" \
          --phase ${{ github.event.inputs.phase }} \
          --total-phases ${{ github.event.inputs.total-phases }} \
          --concurrency ${{ github.event.inputs.concurrency }}

    # Deploys (commits) state updates and encrypted books straight back to the repository branch
    - name: Deploy Output Files to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage responses directory and pipeline outputs folder containing the encrypted books
        git add local_responses/ pipeline_outputs/
        
        if git diff-index --quiet HEAD --; then
          echo "No new files or progress state updates to commit."
        else
          git commit -m "deploy: update progress state and deploy encrypted book archives [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi
