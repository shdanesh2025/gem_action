name: Run Spelling Alignment Pipeline

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder (Do not change for Project 2)'
        required: true
        default: 'project_2'
      config:
        description: 'Pipeline config filename'
        required: true
        default: 'pipeline_config.json'
      model:
        description: 'Selected Gemini Model'
        required: true
        default: 'gemini-3.1-flash-lite'
      phase:
        description: 'Current execution phase'
        required: true
        default: '1'
      total-phases:
        description: 'Total phases'
        required: true
        default: '1'
      concurrency:
        description: 'Concurrent request limit'
        required: true
        default: '2'

env:
  # Opts into Node 24 natively to silence Node 20 deprecation warnings [1.1.1, 1.2.6]
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "google-genai<2.0" "pydantic<=2.12.3" pyyaml pytz tqdm pydub "httpx[socks]"

    - name: Run Pipeline with Encryption
      env:
        GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
      run: |
        python run_pipeline.py \
          --project "${{ github.event.inputs.project }}" \
          --config "${{ github.event.inputs.config }}" \
          --model "${{ github.event.inputs.model }}" \
          --phase ${{ github.event.inputs.phase }} \
          --total-phases ${{ github.event.inputs.total-phases }} \
          --concurrency ${{ github.event.inputs.concurrency }}

    - name: Deploy Output Files to Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Safely stage local_responses only if the directory exists and is not empty [1.2.8]
        if [ -d "local_responses" ] && [ "$(ls -A local_responses)" ]; then
          echo "Staging local_responses directory..."
          git add local_responses/
        fi
        
        # Safely stage pipeline_outputs only if the directory exists and is not empty [1.2.8]
        if [ -d "pipeline_outputs" ] && [ "$(ls -A pipeline_outputs)" ]; then
          echo "Staging pipeline_outputs directory..."
          git add pipeline_outputs/
        fi
        
        # Only commit and push if there are actual unstaged changes to avoid workflow errors
        if git diff-index --quiet HEAD --; then
          echo "No new files or progress state updates to commit."
        else
          git commit -m "deploy: update progress state and deploy encrypted book archives [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi
